<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マイ画像ランチスロット</title>
    <style>
        :root {
            --gold: #ffd700;
            --red: #ff3333;
            --dark: #121212;
            --panel: #2a2a2a;
            --neon: #00ffcc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--dark);
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            font-size: 1.5rem;
            text-align: center;
            height: 5vh;
        }

        /* スロット筐体 */
        .slot-machine {
            width: 100%;
            max-width: 360px;
            height: 65vh;
            background: linear-gradient(180deg, #444, #222);
            border: 4px solid #555;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* 3連リール窓 */
        .reel-window {
            display: flex;
            gap: 10px;
            background-color: #000;
            border: 4px solid #111;
            border-radius: 8px;
            height: 75%;
            padding: 5px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
        }

        .reel-window::before, .reel-window::after {
            content: '';
            position: absolute;
            left: 0; width: 100%; height: 30px;
            z-index: 2;
            pointer-events: none;
        }
        .reel-window::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .reel-window::after { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        /* 各リール */
        .reel-container {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #fff;
            border-radius: 4px;
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .spinning {
            animation: reelLoop 0.18s infinite linear;
        }

        /* リール内の図柄（高さ120pxに固定） */
        .slot-item {
            height: 120px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #000;
            text-align: center;
            padding: 4px;
            border-bottom: 1px solid #ddd;
            background: #fff;
        }

        /* ★ 用意してもらった画像を表示するスタイル */
        .item-img {
            width: 90%;
            height: 55px;
            object-fit: cover; /* 縦横比を維持して綺麗に収める */
            border-radius: 4px;
            margin-bottom: 4px;
            border: 1px solid #ccc;
            background-color: #eee; /* 万が一読み込みが遅い時の下地 */
        }

        .item-label {
            font-size: 9px;
            font-weight: bold;
            color: #666;
        }

        .item-value {
            font-size: 11px;
            font-weight: 900;
            color: #111;
            word-break: break-all;
            line-height: 1.1;
        }

        /* 下部のコントロールパネル */
        .panel-bottom {
            height: 20%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 5px;
            border: 2px solid #333;
        }

        .stop-btn {
            width: 75px;
            height: 45px;
            background: linear-gradient(135deg, #ff5555, #cc0000);
            border: 3px solid #fff;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #800, 0 4px 10px rgba(255,0,0,0.5);
            transition: all 0.1s;
        }

        .stop-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #800;
        }

        .stop-btn:disabled {
            background: #444;
            border-color: #666;
            box-shadow: none;
            color: #777;
            transform: none;
        }

        .action-area {
            height: 12vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .main-btn {
            background: linear-gradient(135deg, #00ffcc, #009977);
            border: 3px solid #fff;
            color: #fff;
            padding: 10px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }

        .reel-container.stopped-flash {
            animation: flashLight 0.3s ease-out;
        }
        .reel-container.stopped-flash .slot-item {
            background: #fff9d0;
        }

        /* --- アニメーション --- */
        @keyframes reelLoop {
            0% { transform: translateY(0); }
            100% { transform: translateY(-480px); } /* 120px × 各リール4個分でループ計算（2個のデータをループ用に複製するため4個分） */
        }

        @keyframes flashLight {
            0% { filter: brightness(2); }
            100% { filter: brightness(1); }
        }

        @keyframes bounceStop {
            0% { transform: translateY(-12px); }
            50% { transform: translateY(4px); }
            100% { transform: translateY(0); }
        }
        .bounce { animation: bounceStop 0.15s ease-out forwards; }
    </style>
</head>
<body>

    <h1>LUNCH REVIEW SLOT</h1>

    <div class="slot-machine">
        <div class="reel-window">
            <div class="reel-container" id="reel-container-0">
                <div class="reel-strip spinning" id="strip-0"></div>
            </div>
            <div class="reel-container" id="reel-container-1">
                <div class="reel-strip spinning" id="strip-1"></div>
            </div>
            <div class="reel-container" id="reel-container-2">
                <div class="reel-strip spinning" id="strip-2"></div>
            </div>
        </div>

        <div class="panel-bottom">
            <button class="stop-btn" id="btn-0" onclick="stopReel(0)">STOP 1</button>
            <button class="stop-btn" id="btn-1" onclick="stopReel(1)" disabled>STOP 2</button>
            <button class="stop-btn" id="btn-2" onclick="stopReel(2)" disabled>STOP 3</button>
        </div>
    </div>

    <div class="action-area">
        <button class="main-btn" id="mainBtn" onclick="resetSlot()" style="display:none;">もう一度回す</button>
    </div>

    <script>
        // ★ 6枚の画像を左・中・右リールに「2枚ずつ」均等に割り振りました。
        // パスを「./画像名」にすることで、同じフォルダ内の画像を正確に引っ張ります。
        const reeledData = [
            // 左リール（画像1、2）
            [
                { label: "【店名・メニュー】", value: "麺屋 一撃<br>特製濃厚豚骨", img: "./レビュー1.jpg" },
                { label: "【価格・コスパ】", value: "980円<br>(神コスパ！)", img: "./レビュー2.jpg" }
            ],
            // 中リール（画像3、4）
            [
                { label: "【味の評価】", value: "★★★★★<br>超濃厚神スープ", img: "./レビュー3.jpg" },
                { label: "【ボリューム】", value: "★★★★☆<br>大満足の太麺", img: "./レビュー4.jpg" }
            ],
            // 右リール（画像5、6）
            [
                { label: "【お店の雰囲気】", value: "活気ある<br>元気系な店内", img: "./レビュー5.jpg" },
                { label: "【リピート度】", value: "ガチ即リピ確定<br>（週2推奨）", img: "./レビュー6.jpg" }
            ]
        ];

        let targetIndexes = [0, 0, 0];
        const ITEM_HEIGHT = 120;

        function スロット仕込み() {
            for (let r = 0; r < 3; r++) {
                const strip = document.getElementById(`strip-${r}`);
                let htmlContent = '';
                const items = reeledData[r];
                
                // 無限ループで回っているように見せるための複製回数
                const loopCount = 8; 
                
                for(let l=0; l<loopCount; l++) {
                    items.forEach(item => {
                        htmlContent += `
                            <div class="slot-item">
                                <img src="${item.img}" class="item-img" alt="review-img">
                                <div class="item-label">${item.label}</div>
                                <div class="item-value">${item.value}</div>
                            </div>
                        `;
                    });
                }
                strip.innerHTML = htmlContent;
            }
        }

        function startSlot() {
            for (let r = 0; r < 3; r++) {
                const strip = document.getElementById(`strip-${r}`);
                const container = document.getElementById(`reel-container-${r}`);
                strip.style.transform = 'none';
                strip.classList.remove('bounce');
                strip.classList.add('spinning');
                container.classList.remove('stopped-flash');
                
                // 各リール2枚ずつなので、0か1をランダムでターゲットにする
                targetIndexes[r] = Math.floor(Math.random() * 2);
            }
            document.getElementById('btn-0').disabled = false;
            document.getElementById('btn-1').disabled = true;
            document.getElementById('btn-2').disabled = true;
            document.getElementById('mainBtn').style.display = 'none';
        }

        function stopReel(reelNum) {
            const strip = document.getElementById(`strip-${reelNum}`);
            const container = document.getElementById(`reel-container-${reelNum}`);
            
            strip.classList.remove('spinning');
            const stopPos = -(targetIndexes[reelNum] * ITEM_HEIGHT);
            strip.style.transform = `translateY(${stopPos}px)`;
            
            strip.classList.add('bounce');
            container.classList.add('stopped-flash');
            document.getElementById(`btn-${reelNum}`).disabled = true;
            
            if (reelNum < 2) {
                document.getElementById(`btn-${reelNum + 1}`).disabled = false;
            } else {
                document.getElementById('mainBtn').style.display = 'block';
            }
        }

        function resetSlot() {
            startSlot();
        }

        // 起動
        スロット仕込み();
        startSlot();
    </script>
</body>
</html>
